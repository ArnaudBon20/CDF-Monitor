name: CDF/EFK Monitor

on:
  schedule:
    # Toutes les 30 min entre 6h-22h UTC (8h-00h heure suisse)
    - cron: '*/30 6-22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          THREEMA_GATEWAY_ID: ${{ secrets.THREEMA_GATEWAY_ID }}
          THREEMA_GATEWAY_SECRET: ${{ secrets.THREEMA_GATEWAY_SECRET }}
          THREEMA_RECIPIENT_ID: ${{ secrets.THREEMA_RECIPIENT_ID }}
        run: python monitor.py

      - name: Commit state
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/state.json
          git diff --staged --quiet || git commit -m "🔄 Update monitor state - $(date +'%Y-%m-%d %H:%M')"
          git push
